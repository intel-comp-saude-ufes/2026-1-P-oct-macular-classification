experiment:
  name: simple_cnn
  seed: 42

data:
  manifest: data/processed/manifest.csv
  classes: [CNV, DME, DRUSEN, NORMAL]
  image_size: 224

model:
  name: simple_cnn

training:
  batch_size: 32
  epochs: 20
  learning_rate: 0.001
  num_workers: 2
  patience: 5

imbalance:
  enabled: true
  strategy: weighted_sampler

output:
  dir: outputs

